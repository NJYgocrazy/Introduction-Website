services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: labsite
      MYSQL_USER: lab
      MYSQL_PASSWORD: labpass
      TZ: Asia/Shanghai
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    volumes:
      - mysql_data:/var/lib/mysql

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PORT: 3000
      DATABASE_URL: mysql://lab:labpass@mysql:3306/labsite
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      UPLOAD_DIR: uploads
    volumes:
      - server_uploads:/app/server/uploads

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  mysql_data:
  server_uploads:
